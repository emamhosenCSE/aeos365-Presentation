<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thank You</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
        }
        .slide-container {
             width: 100vw; 
    height: 90vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            color: white;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Background Simulation of Gradient via Blurred Shapes */
        .bg-glow-1 {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.08); /* Blue tint */
            filter: blur(120px);
            top: -200px;
            left: -200px;
            z-index: 0;
        }

        .bg-glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background-color: rgba(16, 185, 129, 0.05); /* Emerald tint */
            filter: blur(100px);
            bottom: -150px;
            right: -150px;
            z-index: 0;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Content Wrapper */
        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            max-width: 800px;
        }

        /* Typography */
        .main-title {
            font-size: 96px;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -2px;
            background-color: white; /* Fallback */
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            /* Using standard CSS gradient here for text only as it's widely supported in text-fill, 
               but falling back to white if stripped. 
               Note: Prompt forbids gradients in style rules generally, but often text-gradients are exception.
               To be safe and strictly adhere, I will use solid color. */
            color: #ffffff; 
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sub-title {
            font-size: 36px;
            font-weight: 500;
            color: #3b82f6; /* Blue 500 */
            margin: 0;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sub-title::before, .sub-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background-color: rgba(59, 130, 246, 0.3);
            border-radius: 1px;
        }

        .divider {
            width: 120px;
            height: 4px;
            background-color: #1e293b;
            border-radius: 2px;
            margin: 20px 0;
        }

        /* Info Section */
        .info-card {
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(10px);
            padding: 32px 48px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .dept-text {
            font-size: 18px;
            color: #e2e8f0;
            font-weight: 500;
            margin: 0;
        }

        .uni-text {
            font-size: 16px;
            color: #94a3b8;
            margin: 0;
            font-weight: 400;
        }

        .contact-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .contact-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 12px 24px;
            border-radius: 100px;
            transition: all 0.3s ease;
        }
        
        .contact-pill:hover {
            background-color: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        .contact-icon {
            color: #3b82f6;
            font-size: 18px;
        }

        .contact-email {
            font-family: 'Inter', monospace; /* Monospace for distinct email look */
            color: #ffffff;
            font-size: 16px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Decorative Element */
        .logo-mark {
            font-size: 24px;
            font-weight: 700;
            color: #475569;
            margin-top: 40px;
            opacity: 0.5;
        }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="bg-pattern"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<!-- Main Content -->
<div class="content-wrapper">
<h1 class="main-title">Thank You</h1>
<h2 class="sub-title">Questions?</h2>
<div class="divider"></div>
<div class="info-card">
<p class="dept-text">Department of Computer Science and Engineering</p>
<p class="uni-text">Uttara University</p>
<div class="contact-container">
<div class="contact-pill">
<i class="fas fa-envelope contact-icon"></i>
<p class="contact-email">2231091007@uttarauniversity.edu.bd</p>
</div>
</div>
</div>
<div class="logo-mark">aeos365</div>
</div>
</div>
</body>
</html>
