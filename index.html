<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeos365: A Modular Enterprise Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        nav { background-color: #2d2d2d; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid #3d3d3d; flex-shrink: 0; z-index: 50; }
        
        .play-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 10px 24px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .play-btn:hover { background: rgba(255,255,255,0.1); border-color: #3b82f6; }

        /* Gallery List */
        main { flex-grow: 1; overflow-y: auto; padding: 80px 0; display: flex; flex-direction: column; align-items: center; gap: 100px; scroll-behavior: smooth; }

        .slide-wrapper {
            width: 90vw;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid #334155;
        }

        .slide-label { position: absolute; top: -35px; left: 0; color: #94a3b8; font-size: 14px; font-weight: 500; }

        .iframe-container { width: 100%; height: 100%; overflow: hidden; border-radius: 11px; }

        /* Working Thumbnail Styling */
        .thumb-iframe { width: 1280px; height: 720px; border: none; pointer-events: none; transform-origin: 0 0; }

        /* --- BASIC FULLSCREEN RENDERING --- */
        #fs-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The container keeps the slide centered and contained without overflow */
        .fs-slide-area {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .fs-frame {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            max-width: 100%;
            max-height: 100%;
            background: #000;
            opacity: 0;
            transform: translateX(28px) scale(1.004);
            transition: opacity 420ms ease, transform 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .fs-frame.is-active {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .fs-frame.enter-from-right {
            transform: translateX(36px) scale(1.01);
        }

        .fs-frame.enter-from-left {
            transform: translateX(-36px) scale(1.01);
        }

        .fs-frame.exit-to-left {
            opacity: 0;
            transform: translateX(-30px) scale(0.996);
        }

        .fs-frame.exit-to-right {
            opacity: 0;
            transform: translateX(30px) scale(0.996);
        }

        .fs-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 24px; 
            background: rgba(15, 23, 42, 0.95); padding: 12px 30px; 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
        }

        @media (prefers-reduced-motion: reduce) {
            main {
                scroll-behavior: auto;
            }

            .play-btn {
                transition: none;
            }

            .fs-frame {
                transition: none;
                transform: none;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="flex flex-col">
        <h1 class="text-sm font-bold tracking-tight m-0">aeos365: A Modular Enterprise Platform</h1>
        <span class="text-xs text-gray-500">22 Slides Total • Final Year Project</span>
    </div>
    <button class="play-btn" type="button" aria-label="Start slideshow" title="Start slideshow" onclick="startPlay()">
        <i class="fas fa-play text-[10px]"></i> Play
    </button>
</nav>

<main id="gallery-root"></main>

<div id="fs-overlay">
    <div class="fs-slide-area">
        <iframe id="fs-iframe-a" class="fs-frame is-active" title="Presentation slide"></iframe>
        <iframe id="fs-iframe-b" class="fs-frame" title="Presentation slide"></iframe>
    </div>
    <div class="fs-controls">
        <button type="button" aria-label="Previous slide" title="Previous slide" onclick="nav(-1)"><i class="fas fa-chevron-left"></i></button>
        <span id="counter" class="text-sm font-mono text-blue-400">01 / 22</span>
        <button type="button" aria-label="Next slide" title="Next slide" onclick="nav(1)"><i class="fas fa-chevron-right"></i></button>
        <button type="button" aria-label="Exit slideshow" title="Exit slideshow" onclick="exit()"><i class="fas fa-times"></i></button>
    </div>
</div>

<script>
    const TOTAL = 22;
    const TRANSITION_MS = 520;
    const root = document.getElementById('gallery-root');
    const counter = document.getElementById('counter');
    const fsFrames = [
        document.getElementById('fs-iframe-a'),
        document.getElementById('fs-iframe-b')
    ];
    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

    let current = 1;
    let activeFrameIndex = 0;
    let transitionToken = 0;

    // Build the Gallery (Keeping your working logic)
    for(let i=1; i<=TOTAL; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'slide-wrapper';
        wrapper.innerHTML = `
            <span class="slide-label">${i} / ${TOTAL}</span>
            <div class="iframe-container">
                <iframe id="slide-${i}" class="thumb-iframe" src="slides/${i}.html" scrolling="no" title="Slide ${i} preview"></iframe>
            </div>
        `;
        root.appendChild(wrapper);
    }

    function applyScaling() {
        const frames = document.querySelectorAll('.iframe-container');
        frames.forEach(container => {
            const iframe = container.querySelector('iframe');
            if (iframe) {
                const containerWidth = container.offsetWidth;
                const scale = containerWidth / 1280;
                iframe.style.transform = `scale(${scale})`;
            }
        });
    }

    window.onload = applyScaling;
    window.onresize = applyScaling;

    // --- SIMPLIFIED FULLSCREEN LOGIC ---
    function startPlay() {
        current = 1;
        const overlay = document.getElementById('fs-overlay');
        overlay.style.display = 'flex'; // Use flex to center the area
        resetFrames();
        updateFS(1, { immediate: true });
        
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
    }

    function nav(step) {
        const nextSlide = Math.min(TOTAL, Math.max(1, current + step));
        if (nextSlide === current) return;
        const direction = Math.sign(nextSlide - current) || 1;
        current = nextSlide;
        updateFS(direction);
    }

    function resetFrames() {
        transitionToken++;
        activeFrameIndex = 0;
        fsFrames.forEach((frame, index) => {
            frame.className = `fs-frame${index === 0 ? ' is-active' : ''}`;
            frame.removeAttribute('src');
        });
    }

    function updateFS(direction = 1, options = {}) {
        const immediate = options.immediate === true || reducedMotionQuery.matches;
        const nextSrc = `slides/${current}.html`;
        counter.innerText = `${String(current).padStart(2,'0')} / ${TOTAL}`;

        if (immediate) {
            const activeFrame = fsFrames[activeFrameIndex];
            activeFrame.className = 'fs-frame is-active';
            activeFrame.src = nextSrc;
            return;
        }

        const token = ++transitionToken;
        const outgoingIndex = activeFrameIndex;
        const incomingIndex = outgoingIndex === 0 ? 1 : 0;
        const outgoingFrame = fsFrames[outgoingIndex];
        const incomingFrame = fsFrames[incomingIndex];

        incomingFrame.className = `fs-frame ${direction > 0 ? 'enter-from-right' : 'enter-from-left'}`;
        incomingFrame.src = nextSrc;

        requestAnimationFrame(() => {
            if (token !== transitionToken) return;

            outgoingFrame.className = `fs-frame ${direction > 0 ? 'exit-to-left' : 'exit-to-right'}`;
            incomingFrame.classList.add('is-active');
            incomingFrame.classList.remove('enter-from-right', 'enter-from-left');
            activeFrameIndex = incomingIndex;
        });

        setTimeout(() => {
            if (token !== transitionToken) return;
            outgoingFrame.className = 'fs-frame';
        }, TRANSITION_MS);
    }

    function exit() {
        document.getElementById('fs-overlay').style.display = 'none';
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            document.getElementById('fs-overlay').style.display = 'none';
        }
    });

    // Keyboard navigation
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('fs-overlay').style.display === 'flex') {
            if (e.key === "ArrowRight") { e.preventDefault(); nav(1); }
            if (e.key === "ArrowLeft") { e.preventDefault(); nav(-1); }
            if (e.key === "Escape") { e.preventDefault(); exit(); }
        }
    });
</script>

</body>
</html>
