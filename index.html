<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeos365: A Modular Enterprise Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        nav { background-color: #f8fafc; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; z-index: 50; }
        
        .play-btn { background: rgba(59,130,246,0.05); border: 1px solid #cbd5e1; padding: 10px 24px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #0f172a; }
        .play-btn:hover { background: rgba(59,130,246,0.1); border-color: #3b82f6; }

        /* Gallery List */
        main { flex-grow: 1; overflow-y: auto; padding: 80px 0; display: flex; flex-direction: column; align-items: center; gap: 100px; scroll-behavior: smooth; }

        .slide-wrapper {
            width: 90vw;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid #334155;
        }

        .slide-label { position: absolute; top: -35px; left: 0; color: #94a3b8; font-size: 14px; font-weight: 500; }

        .iframe-container { width: 100%; height: 100%; overflow: hidden; border-radius: 11px; }

        /* Working Thumbnail Styling */
        .thumb-iframe { width: 1280px; height: 720px; border: none; pointer-events: none; transform-origin: 0 0; }

        /* --- BASIC FULLSCREEN RENDERING --- */
        #fs-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #f8fafc;
            z-index: 9999; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The container keeps the slide centered and contained without overflow */
        .fs-slide-area {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .fs-frame {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            max-width: 100%;
            max-height: 100%;
            background: #ffffff;
            opacity: 0;
            transform: translateX(28px) scale(1.004);
            transition: opacity 420ms ease, transform 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .fs-frame.is-active {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .fs-frame.enter-from-right {
            transform: translateX(36px) scale(1.01);
        }

        .fs-frame.enter-from-left {
            transform: translateX(-36px) scale(1.01);
        }

        .fs-frame.exit-to-left {
            opacity: 0;
            transform: translateX(-30px) scale(0.996);
        }

        .fs-frame.exit-to-right {
            opacity: 0;
            transform: translateX(30px) scale(0.996);
        }

        .fs-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 24px; 
            background: rgba(248, 250, 252, 0.95); padding: 12px 30px 18px; 
            border-radius: 50px; border: 1px solid #e2e8f0; 
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .fs-controls button {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .fs-controls button:hover {
            background: rgba(59,130,246,0.1);
            border-color: rgba(59,130,246,0.65);
            color: #2563eb;
        }

        .fs-controls button.autoplay-on {
            border-color: rgba(34,197,94,0.7);
            color: #86efac;
        }

        .fs-progress-track {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 6px;
            height: 3px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.25);
            pointer-events: none;
            overflow: hidden;
        }

        .fs-progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        @media (prefers-reduced-motion: reduce) {
            main {
                scroll-behavior: auto;
            }

            .play-btn {
                transition: none;
            }

            .fs-frame {
                transition: none;
                transform: none;
            }

            .fs-progress-fill {
                transition: none;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="flex flex-col">
        <h1 class="text-sm font-bold tracking-tight m-0">aeos365: A Modular Enterprise Platform</h1>
        <span class="text-xs text-gray-500">21 Slides Total • Final Year Project</span>
    </div>
    <button class="play-btn" type="button" aria-label="Start slideshow" title="Start slideshow" onclick="startPlay()">
        <i class="fas fa-play text-[10px]"></i> Play
    </button>
</nav>

<main id="gallery-root"></main>

<div id="fs-overlay">
    <div class="fs-slide-area">
        <iframe id="fs-iframe-a" class="fs-frame is-active" title="Presentation slide"></iframe>
        <iframe id="fs-iframe-b" class="fs-frame" title="Presentation slide"></iframe>
    </div>
    <div class="fs-controls">
        <button type="button" aria-label="Previous slide" title="Previous slide" onclick="nav(-1)"><i class="fas fa-chevron-left"></i></button>
        <span id="counter" class="text-sm font-mono text-blue-400">01 / 21</span>
        <button type="button" aria-label="Next slide" title="Next slide" onclick="nav(1)"><i class="fas fa-chevron-right"></i></button>
        <button id="autoplay-toggle" type="button" aria-label="Pause auto-play" title="Pause auto-play" class="autoplay-on" onclick="toggleAutoplay()"><i class="fas fa-pause"></i></button>
        <button type="button" aria-label="Exit slideshow" title="Exit slideshow" onclick="exit()"><i class="fas fa-times"></i></button>
        <div class="fs-progress-track" aria-hidden="true"><div id="autoplay-progress" class="fs-progress-fill"></div></div>
    </div>
</div>

<script>
    // Mapping of slide numbers to actual file paths
    const slideMapping = [
        'slides/0_cover.html',     // 1: Cover Page
        'slides/1.html',           // 2: Introduction
        'slides/2.html',           // 3: Motivation
        'slides/3.html',           // 4: Literature Review
        'slides/4.html',           // 5: Problem Statement
        'slides/5.html',           // 6: Primary Objectives
        'slides/6.html',           // 7: Secondary Objectives
        'slides/7.html',           // 8: System Architecture
        'slides/10.html',          // 9: Product Modules
        'slides/11.html',          // 10: Modules Details
        'slides/14.html',          // 11: Multi-Tenancy Architecture
        'slides/20_mtimpl.html',   // 12: Multi-Tenancy Implementation
        'slides/13.html',          // 13: HRMAC System
        'slides/21_rbacimpl.html', // 14: HRMAC Implementation
        'slides/15.html',          // 15: Technology Stack
        'slides/17.html',          // 16: Development Methodology
        'slides/22_deploy.html',   // 17: Deployment Strategy
        'slides/23_testing.html',  // 18: Testing Strategy
        'slides/18.html',          // 19: Timeline
        'slides/24_conclusion.html',// 20: Conclusion
        'slides/25_qa.html'        // 21: Q&A
    ];
    
    const TOTAL = 21;
    const TRANSITION_MS = 520;
    const AUTOPLAY_INTERVAL_MS = 6500;
    const root = document.getElementById('gallery-root');
    const counter = document.getElementById('counter');
    const autoplayBtn = document.getElementById('autoplay-toggle');
    const autoplayProgress = document.getElementById('autoplay-progress');
    const fsFrames = [
        document.getElementById('fs-iframe-a'),
        document.getElementById('fs-iframe-b')
    ];
    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

    let current = 1;
    let activeFrameIndex = 0;
    let transitionToken = 0;
    let autoplayTimer = null;
    let autoplayEnabled = true;
    let autoplayProgressFrame = null;
    let autoplayProgressStart = 0;

    // Build the Gallery (Keeping your working logic)
    for(let i=1; i<=TOTAL; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'slide-wrapper';
        const slideFile = slideMapping[i-1];
        wrapper.innerHTML = `
            <span class="slide-label">${i} / ${TOTAL}</span>
            <div class="iframe-container">
                <iframe id="slide-${i}" class="thumb-iframe" src="${slideFile}" scrolling="no" title="Slide ${i} preview"></iframe>
            </div>
        `;
        root.appendChild(wrapper);
    }

    function applyScaling() {
        const frames = document.querySelectorAll('.iframe-container');
        frames.forEach(container => {
            const iframe = container.querySelector('iframe');
            if (iframe) {
                const containerWidth = container.offsetWidth;
                const scale = containerWidth / 1280;
                iframe.style.transform = `scale(${scale})`;
            }
        });
    }

    window.onload = applyScaling;
    window.onresize = applyScaling;

    // --- SIMPLIFIED FULLSCREEN LOGIC ---
    function startPlay() {
        current = 1;
        const overlay = document.getElementById('fs-overlay');
        overlay.style.display = 'flex'; // Use flex to center the area
        resetFrames();
        updateFS(1, { immediate: true });
        setProgress(0);
        startAutoplay();
        
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
    }

    function nav(step, options = {}) {
        const nextSlide = Math.min(TOTAL, Math.max(1, current + step));
        if (nextSlide === current) return;
        if (!options.fromAutoplay) {
            stopAutoplay();
        }
        const direction = Math.sign(nextSlide - current) || 1;
        current = nextSlide;
        updateFS(direction);
    }

    function syncAutoplayUI() {
        const icon = autoplayBtn.querySelector('i');
        if (autoplayEnabled) {
            autoplayBtn.classList.add('autoplay-on');
            autoplayBtn.setAttribute('aria-label', 'Pause auto-play');
            autoplayBtn.setAttribute('title', 'Pause auto-play');
            icon.className = 'fas fa-pause';
        } else {
            autoplayBtn.classList.remove('autoplay-on');
            autoplayBtn.setAttribute('aria-label', 'Resume auto-play');
            autoplayBtn.setAttribute('title', 'Resume auto-play');
            icon.className = 'fas fa-play';
        }
    }

    function scheduleAutoplay() {
        clearTimeout(autoplayTimer);
        if (!autoplayEnabled || document.getElementById('fs-overlay').style.display !== 'flex') return;

        startProgressAnimation();

        autoplayTimer = setTimeout(() => {
            if (!autoplayEnabled) return;
            if (current >= TOTAL) {
                setProgress(100);
                stopAutoplay();
                return;
            }
            nav(1, { fromAutoplay: true });
            scheduleAutoplay();
        }, AUTOPLAY_INTERVAL_MS);
    }

    function startAutoplay() {
        autoplayEnabled = true;
        syncAutoplayUI();
        setProgress(0);
        scheduleAutoplay();
    }

    function stopAutoplay() {
        autoplayEnabled = false;
        clearTimeout(autoplayTimer);
        stopProgressAnimation();
        syncAutoplayUI();
    }

    function toggleAutoplay() {
        if (autoplayEnabled) {
            stopAutoplay();
        } else {
            startAutoplay();
        }
    }

    function resetFrames() {
        transitionToken++;
        activeFrameIndex = 0;
        fsFrames.forEach((frame, index) => {
            frame.className = `fs-frame${index === 0 ? ' is-active' : ''}`;
            frame.removeAttribute('src');
        });
    }

    function updateFS(direction = 1, options = {}) {
        const immediate = options.immediate === true || reducedMotionQuery.matches;
        const nextSrc = slideMapping[current - 1];
        counter.innerText = `${String(current).padStart(2,'0')} / ${TOTAL}`;

        if (immediate) {
            const activeFrame = fsFrames[activeFrameIndex];
            activeFrame.className = 'fs-frame is-active';
            activeFrame.src = nextSrc;
            return;
        }

        const token = ++transitionToken;
        const outgoingIndex = activeFrameIndex;
        const incomingIndex = outgoingIndex === 0 ? 1 : 0;
        const outgoingFrame = fsFrames[outgoingIndex];
        const incomingFrame = fsFrames[incomingIndex];

        incomingFrame.className = `fs-frame ${direction > 0 ? 'enter-from-right' : 'enter-from-left'}`;
        incomingFrame.src = nextSrc;

        requestAnimationFrame(() => {
            if (token !== transitionToken) return;

            outgoingFrame.className = `fs-frame ${direction > 0 ? 'exit-to-left' : 'exit-to-right'}`;
            incomingFrame.classList.add('is-active');
            incomingFrame.classList.remove('enter-from-right', 'enter-from-left');
            activeFrameIndex = incomingIndex;
        });

        setTimeout(() => {
            if (token !== transitionToken) return;
            outgoingFrame.className = 'fs-frame';
        }, TRANSITION_MS);
    }

    function setProgress(percent) {
        const value = Math.max(0, Math.min(100, percent));
        autoplayProgress.style.width = `${value}%`;
    }

    function stopProgressAnimation() {
        if (autoplayProgressFrame !== null) {
            cancelAnimationFrame(autoplayProgressFrame);
            autoplayProgressFrame = null;
        }
    }

    function startProgressAnimation() {
        stopProgressAnimation();
        autoplayProgressStart = performance.now();
        setProgress(0);

        const tick = (now) => {
            if (!autoplayEnabled) return;
            const elapsed = now - autoplayProgressStart;
            const progress = (elapsed / AUTOPLAY_INTERVAL_MS) * 100;
            setProgress(progress);

            if (progress < 100) {
                autoplayProgressFrame = requestAnimationFrame(tick);
            } else {
                autoplayProgressFrame = null;
            }
        };

        autoplayProgressFrame = requestAnimationFrame(tick);
    }

    function exit() {
        document.getElementById('fs-overlay').style.display = 'none';
        stopAutoplay();
        setProgress(0);
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            document.getElementById('fs-overlay').style.display = 'none';
            stopAutoplay();
            setProgress(0);
        }
    });

    // Keyboard navigation
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('fs-overlay').style.display === 'flex') {
            if (e.key === "ArrowRight") { e.preventDefault(); nav(1); }
            if (e.key === "ArrowLeft") { e.preventDefault(); nav(-1); }
            if (e.key === " " || e.key.toLowerCase() === 'k') { e.preventDefault(); toggleAutoplay(); }
            if (e.key === "Escape") { e.preventDefault(); exit(); }
        }
    });

    syncAutoplayUI();
</script>

</body>
